name: ci

on:
  push:
  pull_request:

jobs:
  db-validate:
    name: Fase 0 · schema offline (pglite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run db:validate

  esteira-tests:
    name: Fase 2 · esteira (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: esteira
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: python -m pytest

  extension-tests:
    name: Fase 4 · extensao (node --test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm test

  front-build:
    name: Fase 1 · front (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint
      - run: npm run build
