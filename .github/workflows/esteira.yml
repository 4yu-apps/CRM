name: esteira

# Roda o autopilot de graca no cron do GitHub Actions, sem PC ligado:
# itera os perfis com autopilot, descobre no Google Maps (Places), enriquece,
# pontua e rascunha, por usuario. Enche a fila sozinho.
# Secrets: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, OWNER_USER_ID,
#          GOOGLE_MAPS_API_KEY (descoberta), GEMINI_API_KEY (copy, opcional).

on:
  schedule:
    # De 2 em 2 horas: lotes pequenos e frequentes drenam a fila "de pouquinho
    # em pouquinho", sem lote gigante 2x/dia que arrisca estourar a API e empacar.
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      batch:
        description: "Tamanho do lote"
        default: "60"

concurrency:
  group: esteira
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: esteira
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Autopilot (descobre no Maps + enrich -> score -> draft, por usuario)
        env:
          GARIMPO_SINK: supabase
          GARIMPO_SOURCES: real
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OWNER_USER_ID: ${{ secrets.OWNER_USER_ID }}
          # Lote enxuto: o pipeline (enrich/score/draft) processa de pouco em
          # pouco a cada run, com retry/backoff e erro isolado por lead. Roda a
          # cada 2h, entao a vazao (lote x runs) supera a descoberta e a fila
          # drena sozinha — sem lote gigante que arrisca estourar a API.
          GARIMPO_BATCH: ${{ github.event.inputs.batch || vars.GARIMPO_BATCH || '60' }}
          GARIMPO_DELAY: "0.4"
          # Descoberta oficial: Google Places (server-side, sem PC). Enquanto o
          # secret GOOGLE_MAPS_API_KEY nao existir, o autopilot pausa a descoberta
          # sem quebrar e sem injetar dado falso (guarda em run.py). A extensao do
          # Maps fica em standby, nao entra aqui. 1 pagina (~20/nicho) pra a
          # descoberta nao passar a frente do processamento.
          GARIMPO_MAPS: places
          GARIMPO_MAPS_PAGES: ${{ vars.GARIMPO_MAPS_PAGES || '1' }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          # Nichos extras aleatorios por run (variedade sem o dono pedir). Como
          # agora roda a cada 2h, 1 basta — descoberta gentil pra nao atropelar
          # o processamento e deixar a fila drenar.
          GARIMPO_EXTRA_NICHES: ${{ vars.GARIMPO_EXTRA_NICHES || '1' }}
          # Copy: mock (R$0) por padrao. Variavel de repo GARIMPO_LLM=groq|gemini
          # + o secret correspondente liga a IA de verdade (com fallback pro mock).
          GARIMPO_LLM: ${{ vars.GARIMPO_LLM || 'mock' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # "ja anuncia?" via Meta Ad Library. Sem o secret, a fonte fica inerte.
          META_AD_LIBRARY_TOKEN: ${{ secrets.META_AD_LIBRARY_TOKEN }}
        run: python -m garimpo_esteira.run autopilot
