name: esteira

# Roda o autopilot de graca no cron do GitHub Actions, sem PC ligado:
# itera os perfis com autopilot, descobre no Google Maps (Places), enriquece,
# pontua e rascunha, por usuario. Enche a fila sozinho.
# Secrets: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, OWNER_USER_ID,
#          GOOGLE_MAPS_API_KEY (descoberta), GEMINI_API_KEY (copy, opcional).

on:
  schedule:
    # De 2 em 2 horas: lotes pequenos e frequentes drenam a fila "de pouquinho
    # em pouquinho", sem lote gigante 2x/dia que arrisca estourar a API e empacar.
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      command:
        description: "Comando da esteira"
        default: "autopilot"
        type: choice
        options: ["autopilot", "drain", "backfill", "search", "redraft"]
      batch:
        description: "Tamanho do lote"
        default: "60"
      # Busca direcionada (tela Buscar): o dono que pediu e o endereco digitado.
      owner:
        description: "owner_id (command=search)"
        default: ""
      niche:
        description: "ramo/nicho (command=search)"
        default: ""
      city:
        description: "cidade (command=search)"
        default: ""
      state:
        description: "estado/UF (command=search)"
        default: ""
      neighborhood:
        description: "bairro/zona (command=search)"
        default: ""

concurrency:
  group: esteira
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: esteira
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Autopilot (descobre no Maps + enrich -> score -> draft, por usuario)
        env:
          GARIMPO_SINK: supabase
          GARIMPO_SOURCES: real
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OWNER_USER_ID: ${{ secrets.OWNER_USER_ID }}
          # Lote enxuto: o pipeline (enrich/score/draft) processa de pouco em
          # pouco a cada run, com retry/backoff e erro isolado por lead. Roda a
          # cada 2h, entao a vazao (lote x runs) supera a descoberta e a fila
          # drena sozinha — sem lote gigante que arrisca estourar a API.
          GARIMPO_BATCH: ${{ github.event.inputs.batch || vars.GARIMPO_BATCH || '60' }}
          GARIMPO_DELAY: "0.4"
          # leads processados em paralelo no pipeline streaming (I/O-bound: HTTP de
          # site/cnpj/etc.). Acelera ~Nx; SupabaseSink e thread-safe + retry em
          # 429/5xx. Modesto pra nao estourar rate limit das APIs gratis.
          GARIMPO_WORKERS: ${{ vars.GARIMPO_WORKERS || '4' }}
          # Descoberta oficial: Google Places (server-side, sem PC). Enquanto o
          # secret GOOGLE_MAPS_API_KEY nao existir, o autopilot pausa a descoberta
          # sem quebrar e sem injetar dado falso (guarda em run.py). A extensao do
          # Maps fica em standby, nao entra aqui. 1 pagina (~20/nicho) pra a
          # descoberta nao passar a frente do processamento.
          GARIMPO_MAPS: places
          GARIMPO_MAPS_PAGES: ${{ vars.GARIMPO_MAPS_PAGES || '1' }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          # Places Details (telefone/site das capturas via place_id). SKU Enterprise
          # = 1.000 gratis/mes (~30/dia). Limite diario bloqueia antes de virar cobranca;
          # ajuste a var GARIMPO_PLACES_DAILY_LIMIT (0 desliga).
          GARIMPO_PLACES_DAILY_LIMIT: ${{ vars.GARIMPO_PLACES_DAILY_LIMIT || '30' }}
          # Nichos extras aleatorios por run (variedade sem o dono pedir). Como
          # agora roda a cada 2h, 1 basta — descoberta gentil pra nao atropelar
          # o processamento e deixar a fila drenar.
          GARIMPO_EXTRA_NICHES: ${{ vars.GARIMPO_EXTRA_NICHES || '1' }}
          # Copy: mock (R$0) por padrao. Variavel de repo GARIMPO_LLM=groq|gemini
          # + o secret correspondente liga a IA de verdade (com fallback pro mock).
          GARIMPO_LLM: ${{ vars.GARIMPO_LLM || 'mock' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # varias chaves Gemini (free tier por projeto) separadas por virgula;
          # cadeia gemini->...->groq->mock. GEMINI_MODEL fixa o Flash do free tier.
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          # "ja anuncia?" via Meta Ad Library. Sem o secret, a fonte fica inerte.
          META_AD_LIBRARY_TOKEN: ${{ secrets.META_AD_LIBRARY_TOKEN }}
          # PageSpeed Insights (Google, gratis): performance do site no celular.
          # Liga sozinho quando o secret existe (chave gratuita, sem cobranca).
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
        # No cron (sem input): autopilot (descobre + pipeline dos novos) E depois
        # um backfill que re-enriquece uma fatia rotativa dos leads antigos
        # incompletos. Tudo autonomo, sem PC ligado. Dispatch manual com
        # command=backfill roda so o backfill.
        run: |
          CMD="${{ github.event.inputs.command || 'autopilot' }}"
          if [ "$CMD" = "search" ]; then
            # Busca direcionada da tela Buscar: escopada ao dono + endereco.
            python -m garimpo_esteira.run search \
              --owner "${{ github.event.inputs.owner }}" \
              --niche "${{ github.event.inputs.niche }}" \
              --city "${{ github.event.inputs.city }}" \
              --state "${{ github.event.inputs.state }}" \
              --neighborhood "${{ github.event.inputs.neighborhood }}"
          elif [ "$CMD" = "redraft" ]; then
            # Re-rascunha os leads ja em rascunho_pronto com o tom novo, via LLM.
            # Delay gentil: Groq free e ~30 RPM, entao espacar evita 429 (que
            # cairia no mock). A rotacao (mais antigo primeiro) deixa re-rodar o
            # que sobrar caso a cota diaria de tokens corte no meio.
            GARIMPO_DELAY="2.5" python -m garimpo_esteira.run redraft
          else
            python -m garimpo_esteira.run "$CMD"
            if [ "$CMD" = "autopilot" ]; then
              python -m garimpo_esteira.run backfill --batch 40
              # drain: processa leads pendentes de TODO dono (incl. capturas da
              # extensao e quem nao tem autopilot), pra nada ficar parado em bruto.
              python -m garimpo_esteira.run drain
            fi
          fi
