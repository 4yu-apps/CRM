<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Garimpo: configuracao</title>
    <style>
      :root { color-scheme: light; --brand:#6d28d9; --soft:#f4efff; --ink:#18112f; --muted:#706985; --line:#ded7f3; }
      * { box-sizing: border-box; }
      body {
        min-width: 560px;
        margin: 0;
        padding: 28px;
        color: var(--ink);
        background: #faf8ff;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      .wrap { max-width: 560px; margin: 0 auto; }
      .hero {
        padding: 22px;
        border-radius: 18px;
        color: #fff;
        background: linear-gradient(135deg, #9f57ff, #5f22c8);
        box-shadow: 0 18px 45px rgba(76, 29, 149, .22);
      }
      h1 { margin: 0 0 6px; font-size: 22px; letter-spacing: 0; }
      p.muted { color: var(--muted); font-size: 13px; line-height: 1.45; }
      .hero p { color: rgba(255,255,255,.86); margin: 0; }
      .card {
        margin-top: 16px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: #fff;
        box-shadow: 0 10px 30px rgba(32,16,64,.08);
      }
      label { display: block; margin: 14px 0 5px; font-weight: 750; font-size: 12px; color: #4a3a6b; }
      input, select {
        width: 100%;
        padding: 10px 11px;
        border: 1px solid var(--line);
        border-radius: 11px;
        background: #fcfaff;
        color: var(--ink);
        font-size: 13px;
        outline: none;
      }
      input:focus, select:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(109,40,217,.12); }
      button {
        margin-top: 18px;
        padding: 10px 16px;
        border: 0;
        border-radius: 11px;
        background: linear-gradient(135deg, #9f57ff, #5f22c8);
        color: #fff;
        font-weight: 800;
        cursor: pointer;
      }
      fieldset { margin-top:18px; border:1px solid var(--line); border-radius:14px; padding:14px; background:#fcfaff; }
      legend { font-size:12px; color:#4a3a6b; padding:0 6px; font-weight:750; }
      .ok { color: #047857; font-size: 13px; margin-left: 10px; font-weight: 700; }
      .row { display: flex; align-items: center; gap: 10px; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero">
        <h1>Garimpo na extensao</h1>
        <p>Use mock para testar. Para capturar leads reais no Maps ou atualizar status no WhatsApp, entre com sua conta do Supabase.</p>
      </section>

      <section class="card">
        <label>Fonte de dados</label>
        <select id="dataSource">
          <option value="mock">mock (offline)</option>
          <option value="supabase">supabase real</option>
        </select>

        <label>SUPABASE_URL</label>
        <input id="supabaseUrl" placeholder="https://<ref>.supabase.co" />

        <label>ANON KEY</label>
        <input id="anonKey" placeholder="ey..." />

        <fieldset>
          <legend>Login da extensao</legend>
          <p class="muted" style="margin-top:0;">Preencha URL + anon key acima. O login salva o token localmente para respeitar o RLS do Supabase.</p>
          <label>E-mail</label>
          <input id="email" type="email" placeholder="voce@exemplo.com" />
          <label>Senha</label>
          <input id="password" type="password" placeholder="senha" />
          <div class="row"><button id="login" type="button">Entrar e salvar token</button><span id="loginStatus" class="ok"></span></div>
        </fieldset>

        <label>ACCESS TOKEN</label>
        <input id="accessToken" placeholder="Preenchido automaticamente pelo login" />

        <div class="row"><button id="save">Salvar configuracao</button><span id="status" class="ok"></span></div>
      </section>
    </main>

    <script src="options.js"></script>
  </body>
</html>
